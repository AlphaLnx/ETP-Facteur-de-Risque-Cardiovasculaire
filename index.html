/* utilitaire hex → [r,g,b] */
function hexRgb(hex) {
  return [
    parseInt(hex.slice(1,3),16),
    parseInt(hex.slice(3,5),16),
    parseInt(hex.slice(5,7),16),
  ];
}

/* ─── STEPPER ─────────────────────────────────────────────────────────────── */
function Stepper({step}) {
  const steps = ["Choisir mes axes","Définir mon engagement","Mon plan personnalisé"];
  return (
    <div style={{display:"flex",justifyContent:"center",alignItems:"center",padding:"22px 20px 0",flexWrap:"wrap",gap:0}}>
      {steps.map((s,i)=>{
        const active=i+1===step, done=i+1<step;
        return (
          <React.Fragment key={i}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
              <div style={{width:34,height:34,borderRadius:"50%",background:done?"#27ae60":active?"#c0392b":"#ddd",color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Arial,sans-serif",fontSize:13,fontWeight:"bold",boxShadow:active?"0 0 0 4px rgba(192,57,43,0.2)":"none",transition:"all .3s"}}>{done?"✓":i+1}</div>
              <span style={{fontFamily:"Arial,sans-serif",fontSize:11,color:active?"#c0392b":done?"#27ae60":"#aaa",fontWeight:active?"bold":"normal",textAlign:"center",maxWidth:85}}>{s}</span>
            </div>
            {i<steps.length-1&&<div style={{width:44,height:2,background:done?"#27ae60":"#ddd",margin:"0 4px 20px",transition:"all .3s",flexShrink:0}}/>}
          </React.Fragment>
        );
      })}
    </div>
  );
}

/* ─── HEADER ──────────────────────────────────────────────────────────────── */
function Header({step}) {
  return (
    <header style={{background:"linear-gradient(135deg,#7b0d0d 0%,#c0392b 50%,#e74c3c 100%)",color:"white",paddingTop:32,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,backgroundImage:"radial-gradient(circle at 15% 50%, rgba(255,255,255,.07) 0%, transparent 45%)"}}/>
      <svg style={{position:"absolute",bottom:0,left:0,width:"100%",opacity:.1}} height="36" viewBox="0 0 800 36" preserveAspectRatio="none">
        <polyline points="0,18 80,18 110,4 135,30 160,4 185,30 210,18 800,18" fill="none" stroke="white" strokeWidth="2"/>
      </svg>
      <div style={{position:"relative",zIndex:1,textAlign:"center",padding:"0 24px 8px"}}>
        <h1 style={{fontSize:"clamp(20px,4vw,34px)",fontWeight:"bold",margin:"0 0 6px"}}>Mon Plan Cardiovasculaire</h1>
        <p style={{fontFamily:"Arial,sans-serif",fontSize:14,opacity:.8,margin:0}}>Éducation Thérapeutique — Facteurs de Risque Modifiables</p>
      </div>
      <Stepper step={step}/>
    </header>
  );
}

/* ─── ÉTAPE 1 ─────────────────────────────────────────────────────────────── */
function Step1({selected,onToggle,onNext}) {
  const MAX=5, canAdd=selected.length<MAX;
  return (
    <div style={{maxWidth:1100,margin:"0 auto",padding:"28px 20px 60px",animation:"slideIn .4s ease"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <h2 style={{fontSize:22,color:"#1a1a2e",marginBottom:8}}>Quels axes souhaitez-vous améliorer ?</h2>
        <p style={{fontFamily:"Arial,sans-serif",fontSize:14,color:"#777",lineHeight:1.6}}>Sélectionnez <strong>jusqu'à 5 facteurs</strong> sur lesquels vous vous sentez prêt·e à agir.</p>
        <div style={{display:"inline-flex",alignItems:"center",gap:8,marginTop:12,background:selected.length>=MAX?"#fdf0ee":"#eaf4fc",border:`1px solid ${selected.length>=MAX?"#e8a598":"#aed6f1"}`,borderRadius:20,padding:"6px 16px",fontFamily:"Arial,sans-serif",fontSize:13,color:selected.length>=MAX?"#c0392b":"#1a5276",fontWeight:"bold"}}>
          {selected.length>=MAX?"⛔":"🫀"} {selected.length} / {MAX} sélectionné{selected.length>1?"s":""}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:16}}>
        {TOPICS.map(t=>{
          const isSel=selected.includes(t.id), isDis=!isSel&&!canAdd;
          return (
            <div key={t.id} onClick={()=>!isDis&&onToggle(t.id)} style={{background:isSel?t.bg:"white",borderRadius:14,padding:"20px 18px",cursor:isDis?"not-allowed":"pointer",border:`2px solid ${isSel?t.color:isDis?"#f0f0f0":"#e8e8e8"}`,boxShadow:isSel?"0 6px 20px rgba(0,0,0,.1)":"0 2px 8px rgba(0,0,0,.05)",transform:isSel?"translateY(-3px)":"translateY(0)",transition:"all .22s ease",opacity:isDis?.45:1,position:"relative",animation:"fadeIn .35s ease forwards"}}>
              {isSel&&<div style={{position:"absolute",top:10,right:10,width:22,height:22,borderRadius:"50%",background:t.color,color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:"bold"}}>✓</div>}
              <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:isSel?t.color:"#f0f0f0",borderRadius:"12px 12px 0 0"}}/>
              <div style={{fontSize:30,marginBottom:8}}>{t.emoji}</div>
              <h3 style={{fontSize:14,fontWeight:"bold",margin:"0 0 3px",color:"#1a1a2e"}}>{t.title}</h3>
              <p style={{fontFamily:"Arial,sans-serif",fontSize:11,color:"#999",margin:0}}>{t.subtitle}</p>
            </div>
          );
        })}
      </div>
      <div style={{textAlign:"center",marginTop:36}}>
        <button disabled={selected.length===0} onClick={onNext} style={{padding:"15px 44px",background:selected.length===0?"#ddd":"linear-gradient(135deg,#c0392b,#e74c3c)",color:"white",border:"none",borderRadius:50,cursor:selected.length===0?"not-allowed":"pointer",fontSize:15,fontFamily:"Arial,sans-serif",fontWeight:"bold",boxShadow:selected.length===0?"none":"0 6px 20px rgba(192,57,43,.35)"}}>
          Suivant — Définir mon engagement →
        </button>
        {selected.length===0&&<p style={{fontFamily:"Arial,sans-serif",fontSize:13,color:"#bbb",marginTop:10}}>Sélectionnez au moins un facteur pour continuer</p>}
      </div>
    </div>
  );
}

/* ─── ÉTAPE 2 ─────────────────────────────────────────────────────────────── */

        <h2 style={{fontSize:22,color:"#1a1a2e",marginBottom:8}}>Quel niveau de changement visez-vous ?</h2>
        <p style={{fontFamily:"Arial,sans-serif",fontSize:14,color:"#777",lineHeight:1.6}}>Pour chacun des facteurs choisis, indiquez l'intensité du changement souhaité.</p>

      <div style={{display:"flex",flexDirection:"column",gap:18}}>
        {selTopics.map(t=>(
          <div key={t.id} style={{background:"white",borderRadius:16,overflow:"hidden",boxShadow:"0 4px 16px rgba(0,0,0,.08)",animation:"fadeIn .4s ease"}}>

              <span style={{fontSize:24}}>{t.emoji}</span>
              <div style={{flexGrow:1}}>

/* ─── CHECKLIST ───────────────────────────────────────────────────────────── */
function Checklist({selTopics, levels}) {
  const LS_CHECK = "etp_checklist_v1";
  const loadChecked = () => {
    try { var r = localStorage.getItem(LS_CHECK); if(r) return JSON.parse(r); } catch(e) {}
    return {};
  };
  const [checked, setChecked] = useState(loadChecked);
  const toggle = (id) => setChecked(prev => {
    var next = {...prev, [id]: !prev[id]};
    try { localStorage.setItem(LS_CHECK, JSON.stringify(next)); } catch(e) {}
    return next;
  });

  const grouped = selTopics.map(t => ({
    topic: t,
    cfg: LEVEL_CFG[levels[t.id]],
    actions: t.levels[levels[t.id]].actions.map((action,i) => ({
      id: t.id + "-" + i,
      action,
    })),
  }));

  const total = grouped.reduce((s,g) => s + g.actions.length, 0);
  const doneCount = Object.values(checked).filter(Boolean).length;
  const pct = total === 0 ? 0 : Math.round(doneCount / total * 100);

  const downloadPDF = () => {
    const jsPDF = window.jspdf.jsPDF;
    const doc = new jsPDF({orientation:"portrait", unit:"mm", format:"a4"});
    const W = 210, M = 18;
    let y = 20;

    /* en-tête */
    doc.setFillColor(192, 57, 43);
    doc.roundedRect(M, y - 6, W - M*2, 22, 3, 3, "F");
    doc.setFontSize(16); doc.setFont("helvetica","bold"); doc.setTextColor(255,255,255);
    doc.text("Mon Plan Cardiovasculaire", W/2, y+4, {align:"center"});
    doc.setFontSize(9); doc.setFont("helvetica","normal");
    doc.text("Education Therapeutique du Patient - Check-liste personnalisee", W/2, y+11, {align:"center"});
    y += 28;

    /* barre de progression */
    doc.setFontSize(9); doc.setTextColor(100,100,100); doc.setFont("helvetica","normal");
    doc.text("Progression : " + doneCount + " / " + total + " actions (" + pct + "%)", M, y);
    y += 6;
    doc.setFillColor(220,220,220);
    doc.roundedRect(M, y, W-M*2, 4, 2, 2, "F");
    if (pct > 0) {
      doc.setFillColor(192,57,43);
      doc.roundedRect(M, y, Math.max(2, (W-M*2)*pct/100), 4, 2, 2, "F");
    }
    y += 12;

    /* sections */
    grouped.forEach(function(g) {
      var tRgb = hexRgb(g.topic.color);
      var lRgb = hexRgb(g.cfg.color);

      if (y > 260) { doc.addPage(); y = 20; }

      /* bandeau thème */
      doc.setFillColor(tRgb[0], tRgb[1], tRgb[2]);
      doc.roundedRect(M, y-4, W-M*2, 14, 2, 2, "F");
      doc.setFontSize(12); doc.setFont("helvetica","bold"); doc.setTextColor(255,255,255);
      doc.text(g.topic.title, M+5, y+5);
      doc.setFontSize(9); doc.setFont("helvetica","normal");
      doc.text("Niveau : " + g.cfg.label, W-M-5, y+5, {align:"right"});
      y += 16;

      g.actions.forEach(function(item) {
        if (y > 272) { doc.addPage(); y = 20; }
        var isDone = !!checked[item.id];

        /* case à cocher */
        if (isDone) {
          doc.setFillColor(lRgb[0], lRgb[1], lRgb[2]);
          doc.setDrawColor(lRgb[0], lRgb[1], lRgb[2]);
        } else {
          doc.setFillColor(255,255,255);
          doc.setDrawColor(180,180,180);
        }
        doc.setLineWidth(0.5);
        doc.roundedRect(M, y-3.5, 5, 5, 1, 1, isDone ? "FD" : "S");
        if (isDone) {
          doc.setDrawColor(255,255,255);
          doc.setLineWidth(0.8);
          doc.line(M+1, y, M+2.5, y+1.5);
          doc.line(M+2.5, y+1.5, M+4, y-1);
        }

        /* texte action */
        doc.setFontSize(9.5);
        doc.setFont("helvetica", isDone ? "italic" : "normal");
        if (isDone) {
          doc.setTextColor(160,160,160);
        } else {
          doc.setTextColor(55,55,55);
        }
        var lines = doc.splitTextToSize(item.action, W-M*2-10);
        doc.text(lines, M+8, y);
        if (isDone) {
          doc.setDrawColor(160,160,160);
          doc.setLineWidth(0.3);
          var tw = doc.getTextWidth(lines[0]);
          doc.line(M+8, y-0.5, M+8+Math.min(tw, W-M*2-10), y-0.5);
        }
        y += lines.length * 5 + 3;
      });
      y += 6;
    });

    /* pied de page */
    var pages = doc.internal.getNumberOfPages();
    for (var p=1; p<=pages; p++) {
      doc.setPage(p);
      doc.setFontSize(7.5); doc.setTextColor(160,160,160); doc.setFont("helvetica","normal");
      doc.text("Education Therapeutique du Patient - Plan Cardiovasculaire Personnalise", M, 290);
      doc.text("Page " + p + " / " + pages, W-M, 290, {align:"right"});
    }

    doc.save("mon-plan-cardiovasculaire.pdf");
  };

  return (
    <div style={{background:"white",borderRadius:18,boxShadow:"0 6px 24px rgba(0,0,0,.09)",overflow:"hidden",marginTop:32,border:"1px solid #f0f0f0"}}>
      {/* en-tête checklist */}
      <div style={{background:"linear-gradient(135deg,#1a1a2e,#2c3e6b)",padding:"20px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div>
          <h3 style={{color:"white",fontSize:18,fontWeight:"bold",margin:"0 0 4px"}}>✅ Ma check-liste personnalisée</h3>
          <p style={{fontFamily:"Arial,sans-serif",fontSize:13,color:"rgba(255,255,255,.6)",margin:0}}>Cochez les actions au fur et à mesure de vos progrès</p>
        </div>
        <div style={{background:"rgba(255,255,255,.15)",borderRadius:20,padding:"6px 16px",fontFamily:"Arial,sans-serif",fontSize:13,color:"white",fontWeight:"bold"}}>
          {doneCount} / {total} — {pct}%
        </div>
      </div>

      {/* barre de progression */}
      <div style={{height:6,background:"#f0f0f0"}}>
        <div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,#27ae60,#2ecc71)",transition:"width .4s ease",borderRadius:"0 3px 3px 0"}}/>
      </div>

      {/* items groupés */}
      <div style={{padding:22}}>
        {grouped.map(g => {
          const topicDone = g.actions.filter(it => checked[it.id]).length;
          return (
            <div key={g.topic.id} style={{marginBottom:22}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,paddingBottom:8,borderBottom:`2px solid ${g.topic.bg}`}}>
                <span style={{fontSize:20}}>{g.topic.emoji}</span>
                <span style={{fontWeight:"bold",fontSize:15,color:g.topic.color}}>{g.topic.title}</span>
                <span style={{fontFamily:"Arial,sans-serif",fontSize:11,background:g.cfg.bg,color:g.cfg.color,border:`1px solid ${g.cfg.border}`,borderRadius:20,padding:"2px 10px",fontWeight:"bold"}}>{g.cfg.icon} {g.cfg.label}</span>
                <span style={{fontFamily:"Arial,sans-serif",fontSize:12,color:"#aaa",marginLeft:"auto"}}>{topicDone}/{g.actions.length}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {g.actions.map(item => {
                  const done = !!checked[item.id];
                  return (
                    <div key={item.id} onClick={()=>toggle(item.id)} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"11px 14px",borderRadius:10,cursor:"pointer",background:done?"#f8fffe":"#fafafa",border:`1.5px solid ${done?g.cfg.color+"55":"#eeeeee"}`,transition:"all .2s",opacity:done?.75:1}}>
                      <div style={{width:22,height:22,borderRadius:6,flexShrink:0,background:done?g.cfg.color:"white",border:`2px solid ${done?g.cfg.color:"#ccc"}`,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s",marginTop:1}}>
                        {done&&<span style={{color:"white",fontSize:13,fontWeight:"bold",animation:"checkBounce .3s ease"}}>✓</span>}
                      </div>
                      <span style={{fontFamily:"Arial,sans-serif",fontSize:14,color:done?"#aaa":"#444",lineHeight:1.55,textDecoration:done?"line-through":"none",transition:"all .2s"}}>{item.action}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* boutons export */}
      <div style={{padding:"0 22px 22px",display:"flex",gap:12,flexWrap:"wrap"}}>
        <button onClick={downloadPDF} style={{flex:1,minWidth:180,padding:"14px 20px",background:"linear-gradient(135deg,#c0392b,#e74c3c)",color:"white",border:"none",borderRadius:12,cursor:"pointer",fontFamily:"Arial,sans-serif",fontWeight:"bold",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8,boxShadow:"0 4px 14px rgba(192,57,43,.3)",transition:"all .2s"}}
          onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"}
          onMouseLeave={e=>e.currentTarget.style.transform="translateY(0)"}
        >
          📥 Télécharger ma check-liste (PDF)
        </button>
        <button onClick={()=>window.print()} style={{flex:1,minWidth:140,padding:"14px 20px",background:"white",border:"2px solid #ddd",borderRadius:12,cursor:"pointer",fontFamily:"Arial,sans-serif",fontWeight:"bold",fontSize:14,color:"#555",display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"all .2s"}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor="#c0392b";e.currentTarget.style.color="#c0392b";}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor="#ddd";e.currentTarget.style.color="#555";}}
        >
          🖨️ Imprimer
        </button>
      </div>

      {pct===100&&total>0&&(
        <div style={{margin:"0 22px 22px",padding:"16px 20px",background:"linear-gradient(135deg,#e8f8f5,#d5f5e3)",borderRadius:12,border:"1px solid #a9dfbf",textAlign:"center",animation:"popIn .4s ease"}}>
          <div style={{fontSize:28,marginBottom:6}}>🎉</div>
          <div style={{fontFamily:"Arial,sans-serif",fontWeight:"bold",color:"#1e8449",fontSize:15}}>Félicitations ! Vous avez complété toutes vos actions.</div>
          <div style={{fontFamily:"Arial,sans-serif",fontSize:13,color:"#27ae60",marginTop:4}}>Parlez de vos progrès à votre soignant lors de votre prochaine consultation.</div>
        </div>
      )}
    </div>
  );
}

/* ─── PERSISTENCE localStorage ───────────────────────────────────────────── */
const LS_KEY = "etp_plan_v1";

function loadState() {
  try {
    var raw = localStorage.getItem(LS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveState(step, selected, levels) {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({step:step, selected:selected, levels:levels}));
  } catch(e) {}
}

function clearState() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}

/* ─── APP ─────────────────────────────────────────────────────────────────── */
function App() {
  var saved = loadState();
  const [step,     setStep]     = useState(saved ? saved.step     : 1);
  const [selected, setSelected] = useState(saved ? saved.selected : []);
  const [levels,   setLevels]   = useState(saved ? saved.levels   : {});
  const [restored, setRestored] = useState(!!saved);

  const persist = (s, sel, lv) => saveState(s, sel, lv);

  const toggleTopic = id => setSelected(prev => {
    var next = prev.includes(id) ? prev.filter(x=>x!==id) : prev.length<5 ? [...prev,id] : prev;
    persist(step, next, levels);
    return next;
  });
  const setLevel = (id,lv) => setLevels(prev => {
    var next = {...prev,[id]:lv};
    persist(step, selected, next);
    return next;
  });
  const goTo = n => {
    setStep(n);
    persist(n, selected, levels);
    window.scrollTo({top:0,behavior:"smooth"});
  };
  const restart = () => {
    clearState();
    try { localStorage.removeItem("etp_checklist_v1"); } catch(e) {}
    setSelected([]); setLevels({}); setRestored(false); goTo(1);
  };

  return (
    <div style={{minHeight:"100vh"}}>
      <Header step={step}/>

      {/* Bandeau de reprise de session */}
      {restored && (
        <div style={{background:"linear-gradient(135deg,#eaf4fc,#d6eaf8)",borderBottom:"2px solid #aed6f1",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>💾</span>
            <div>
              <div style={{fontFamily:"Arial,sans-serif",fontWeight:"bold",fontSize:14,color:"#1a5276"}}>Session restaurée</div>
              <div style={{fontFamily:"Arial,sans-serif",fontSize:12,color:"#5d8aa8"}}>Vous reprenez là où vous vous êtes arrêté·e. Vos choix ont été conservés.</div>
            </div>
          </div>
          <button onClick={()=>setRestored(false)} style={{background:"none",border:"1px solid #aed6f1",borderRadius:20,padding:"4px 14px",cursor:"pointer",fontFamily:"Arial,sans-serif",fontSize:12,color:"#1a5276"}}>✕ Fermer</button>
        </div>
      )}

      {step===1&&<Step1 selected={selected} onToggle={toggleTopic} onNext={()=>goTo(2)}/>}
      {step===2&&<Step2 selected={selected} levels={levels} onSetLevel={setLevel} onNext={()=>goTo(3)} onBack={()=>goTo(1)}/>}
      {step===3&&<Step3 selected={selected} levels={levels} onBack={()=>goTo(2)} onRestart={restart}/>}
      <footer style={{background:"#1a1a2e",color:"rgba(255,255,255,.4)",textAlign:"center",padding:"20px",fontFamily:"Arial,sans-serif",fontSize:11,letterSpacing:.5}}>
        Éducation Thérapeutique du Patient — Plan Cardiovasculaire Personnalisé
      </footer>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
